<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <title>Tanga Tashlash</title>
  <style>
    body { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background: #f0f4f8; font-family: sans-serif; }
    .coin { width: 150px; height: 150px; border-radius: 50%; background: #f5c542; display: flex; align-items: center; justify-content: center; font-size: 3rem; font-weight: bold; color: #8b6914; transition: transform 0.6s; box-shadow: 0 6px 12px rgba(0,0,0,0.2); }
    .flip { animation: spin 0.6s ease-in-out; }
    @keyframes spin { 0% { transform: rotateY(0); } 50% { transform: rotateY(900deg); } 100% { transform: rotateY(1080deg); } }
    button { margin-top: 20px; padding: 12px 24px; font-size: 1rem; cursor: pointer; background: #3b82f6; color: white; border: none; border-radius: 8px; }
    #result { margin-top: 15px; font-size: 1.2rem; color: #1e293b; min-height: 1.5em; }
  </style>
</head>
<body>
  <div class="coin" id="coin">₿</div>
  <button onclick="toss()">🎲 Tashlash</button>
  <div id="result">Natija kutmoqda...</div>
  <script>
    function toss() {
      const coin = document.getElementById('coin');
      const res = document.getElementById('result');
      coin.classList.remove('flip'); void coin.offsetWidth; coin.classList.add('flip');
      setTimeout(() => {
        const isHead = Math.random() > 0.5;
        coin.textContent = isHead ? '👑' : '🦅';
        res.textContent = isHead ? "Natija: Gerb (Bosh) 👑" : "Natija: Raqam (Dum) 🦅";
      }, 600);
    }
  </script>
</body>
</html>
